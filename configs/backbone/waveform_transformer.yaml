# Max batch size at 4 s @ 48 kHz, MATPAC cond, single RTX 4090 24 GiB: 129 (AMP on, bf16).
_target_: backbone.transformer.Transformer
name: waveform_transformer
sample_rate: 48000
channels: 1
out_channels: 1
patching:
  patch_size: 512
head:
  type: conv
  kernel_size: 13
block:
  dim: 512
  depth: 12
  heads: 8
conditioning:
  cond_dim: 384  # conditioning width (independent of block width)
  embed_dim: 384  # conditioner output dim, projected to cond_dim
