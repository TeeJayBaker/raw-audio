_target_: backbone.convnexts.ConvNeXt
name: flow2gan
sample_rate: 48000
io:
  type: waveform
  channels: 1
  out_channels: 1
branches:
  mode: multi_resolution
  resolutions:
    - {n_fft: 1024, hop_length: 512, win_length: 1024}
    - {n_fft: 512, hop_length: 256, win_length: 512}
    - {n_fft: 256, hop_length: 128, win_length: 256}
  blocks:
    - {channels: 768}
    - {channels: 512}
    - {channels: 384}
stft:
  n_fft: 2048
  hop_length: 512
  win_length: 2048
head:
  type: istft
  parameterisation: realimag
backend:
  type: real
block:
  type: convnext
  channels: 512
  depth: 8
  kernel_size: 7
  expansion: 3
  norm: biasnorm
  activation: prelu
conditioning:
  mode: film
  cond_dim: 512
