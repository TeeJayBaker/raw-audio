# Max batch size at 4 s @ 48 kHz, MATPAC cond, single RTX 4090 24 GiB: 78 (AMP on, bf16).
# 3× multi-resolution branches + IStftHead make this the heaviest of the five backbones.
_target_: backbone.convnext.ConvNeXt
name: flow2gan
sample_rate: 48000
channels: 1
out_channels: 1
branches:
  mode: multi_resolution
  resolutions:
    - {n_fft: 1024, hop_length: 512, win_length: 1024}
    - {n_fft: 512, hop_length: 256, win_length: 512}
    - {n_fft: 256, hop_length: 128, win_length: 256}
head:
  type: istft
  parameterisation: realimag
block:
  channels: 512
  depth: 8
  kernel_size: 7
  expansion: 3
  layer_scale: "1/depth"
conditioning:
  cond_dim: 384  # matches MATPAC's native embedding dim
