# Max batch size at 4 s @ 48 kHz, MATPAC cond, single RTX 4090 24 GiB: 119 (AMP on, bf16).
_target_: backbone.transformer.Transformer
name: stft_transformer
sample_rate: 48000
channels: 1
out_channels: 1
stft:
  n_fft: 2048
  hop_length: 512
  win_length: 2048
patching:
  patch_size: 1
head:
  type: identity
block:
  dim: 512
  depth: 12
  heads: 8
conditioning:
  cond_dim: 384  # matches MATPAC's native embedding dim
