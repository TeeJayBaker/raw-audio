_target_: backbone.convnexts.ConvNeXt
name: rfwave
sample_rate: 48000
# Faithful RFWave training must call return_aux=True and apply overlap loss
# from aux["subbands"]; the backbone only exposes the subband predictions.
io:
  type: stft
  channels: 1
  out_channels: 1
  n_fft: 2048
  hop_length: 512
  win_length: 2048
  freq_bins: 1025
branches:
  mode: subband
  count: 8
  overlap_bins: 16
  subband_conditioning: true
stft:
  n_fft: 2048
  hop_length: 512
  win_length: 2048
head:
  type: istft
  parameterisation: realimag
backend:
  type: real
block:
  type: convnext
  channels: 512
  depth: 8
  kernel_size: 7
  expansion: 3
  grn: true
conditioning:
  mode: adaln
  cond_dim: 512
