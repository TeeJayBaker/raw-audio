# Max batch size at 4 s @ 48 kHz, MATPAC cond, single RTX 4090 24 GiB: 472 (AMP on, bf16).
_target_: backbone.convnext.ConvNeXt
name: wavenext
sample_rate: 48000
channels: 1
out_channels: 1
branches:
  mode: single
stft:
  n_fft: 2048
  hop_length: 512
  win_length: 2048
head:
  type: wavenext
block:
  channels: 512
  depth: 8
  kernel_size: 7
  expansion: 3
  layer_scale: "1/depth"
conditioning:
  cond_dim: 384  # matches MATPAC's native embedding dim — no projector adapter needed
  time_scale: 100.0
