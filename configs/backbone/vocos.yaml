# Max batch size at 4 s @ 48 kHz, MATPAC cond, single RTX 4090 24 GiB: 353 (AMP on, bf16).
_target_: backbone.convnext.ConvNeXt
name: vocos
sample_rate: 48000
channels: 1
out_channels: 1
branches:
  mode: single
stft:
  n_fft: 2048
  hop_length: 512
  win_length: 2048
head:
  type: istft
  parameterisation: magphase
block:
  channels: 512
  depth: 8
  kernel_size: 7
  expansion: 3
  layer_scale: "1/depth"
conditioning:
  cond_dim: 384  # conditioning width (independent of block width)
  embed_dim: 384  # conditioner output dim, projected to cond_dim
