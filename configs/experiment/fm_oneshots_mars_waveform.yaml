# @package _global_
#
# Self-contained: inherits the same base modules as fm_baseline but selects
# waveform_transformer directly so there's no leftover wavenext subtree to merge.
# Body mirrors fm_oneshots_mars so the two runs differ only in backbone + batch.

defaults:
  - /train/default@train
  - /data/audio_directory@data
  - /flow/fm@flow
  - /backbone/waveform_transformer@backbone
  - /eval/preliminary@eval
  - _self_

trainer:
  _target_: trainer.RFTrainer

backbone:
  conditioning:
    time_scale: ${flow.t_encoding.scale}

conditioner:
  type: matpac
  checkpoint_path: /media/NAS/neutone/diff_one_shot/checkpoints/whole-violet-235/last-v1_clean.ckpt
  device: ${train.device}
  use_teacher: false
  encode_batch_size: 0
  compile_encoder: false

loss:
  loss_space: v
  primary: mse
  mr_stft_weight: 0.0
  mr_stft_log_weight: 0.0

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]

data:
  root: /media/storage/samples/samples_from_mars/one_shots

train:
  run_dir: runs/fm-oneshots-mars-waveform-200k
  device: cuda
  max_steps: 200000
  amp: true
  ema_decay: 0.999
  grad_clip: 1.0
  warmup_steps: 2000
  min_lr_ratio: 0.0
  resume: null
  val_fraction: 0.02
  log_every: 10
  val_every: 1000
  cond_dropout_prob: 0.1
  sample_every: 2000
  ckpt_every: 5000
  val_batches: 24  # 24 × 64 = 1.5k samples — matches the wavenext run's count
  dataloader:
    batch_size: 64  # bs=128 OOM'd at validation w/ CLAP loaded; 64 leaves comfortable headroom
    num_workers: 8
    pin_memory: true
    drop_last: true
  wandb:
    audio_examples: 10

eval:
  metrics:
    embedding_validation:
      enabled: true
      backend: clap
      distance: mind
      cosine: true
      mind_projections: 256
      cache_real: true
      density_coverage:
        enabled: true
        k: 5

sampling:
  batch_size: 1
  steps: 25
  method: euler
  guidance_scale: 3.5
