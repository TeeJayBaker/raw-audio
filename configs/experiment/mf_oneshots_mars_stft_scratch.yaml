# @package _global_
#
# From-scratch + Muon variant of mf_oneshots_mars_stft (the pMF-faithful recipe: random init, no
# RF warm start, Muon optimiser). Tests whether the curvature / ‖J‖ growth that tanks the
# warm-started runs is avoided when the whole (r,t) field is learned from scratch (the one real
# recipe difference vs pMF/iMF, neither of which warm-starts). Note: this changes TWO things at
# once vs the warm-start run (init + optimiser) — if it trains cleanly, ablate which mattered.
# Implementation/protocol: docs/mf_implementation_spec.md.

defaults:
  - /train/default@train
  - /data/audio_directory@data
  - /flow/mf@flow
  - /backbone/stft_transformer@backbone
  - /eval/preliminary@eval
  - _self_

trainer:
  _target_: trainer.MFTrainer

backbone:
  conditioning:
    time_scale: ${flow.t_encoding.scale}
    gap_embed: true
    guidance_embed: true
    interval_embed: false

flow:
  mf:
    # From random init the boundary (and thus the model-sourced du/dt tangent) is untrained, so seed
    # it with a pure-RF phase before the MF branch engages. References use 0 (50% FM every step via
    # rf_fraction handles it); 10k is a conservative hedge — lower/raise as needed.
    rf_warmup_steps: 0

conditioner:
  type: matpac
  checkpoint_path: /media/NAS/neutone/diff_one_shot/checkpoints/whole-violet-235/last-v1_clean.ckpt
  device: ${train.device}
  use_teacher: false
  encode_batch_size: 0
  compile_encoder: false

loss:
  loss_space: v
  primary: mse
  mr_stft_weight: 1.0
  mr_stft_log_weight: 0.0
  aux_t_min: 0.2  # pMF t<=0.8 mirrored to repo t-axis; gates all x-space aux (mr/complex/wavefm)
  wavefm_weight: 0.0
  complex_stft_weight: 0.005

optimizer:
  _target_: optim.build_muon
  lr: 5.0e-4          # Muon-group LR. pMF uses 1e-3 (optax.contrib.muon) at batch 1024; our
                      # effective batch is 64*4=256 (4x smaller), so sqrt-scaled 1e-3*sqrt(1/4)=5e-4.
                      # Linear rule would give 2.5e-4 — drop to that if early loss is unstable.
  adamw_lr: 3.0e-4    # aux-group LR for 1D params (norm gains / biases)
  momentum: 0.95
  weight_decay: 0.0
  betas: [0.9, 0.95]  # aux AdamW betas; b2=0.95 matches pMF's adam_b2

data:
  root: /media/storage/samples/samples_from_mars/one_shots

train:
  run_dir: runs/mf-oneshots-mars-stft-scratch
  device: cuda
  init_from: null   # from scratch — no RF warm start
  max_steps: 150000
  amp: true
  ema_decay: 0.999
  grad_clip: 1.0
  grad_accum_steps: 4
  warmup_steps: 2000
  min_lr_ratio: 0.0
  resume: null
  val_fraction: 0.02
  log_every: 10
  val_every: 1000
  cond_dropout_prob: 0.1
  sample_every: 2000
  ckpt_every: 25000
  val_batches: 24
  dataloader:
    batch_size: 64
    num_workers: 8
    pin_memory: true
    drop_last: true
  wandb:
    audio_examples: 10

eval:
  metrics:
    embedding_validation:
      enabled: true
      backend: clap
      distance: mind
      cosine: true
      mind_projections: 256
      cache_real: true
      density_coverage:
        enabled: true
        k: 5

sampling:
  batch_size: 1
  steps: 1
  method: euler
  guidance_scale: 1.0
  guidance_t_lo: null
  guidance_t_hi: null
