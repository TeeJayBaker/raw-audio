# @package _global_

defaults:
  - /train/default@train
  - /data/audio_directory@data
  - /flow/fm@flow
  - /backbone/stft_transformer@backbone
  - /eval/preliminary@eval
  - _self_

trainer:
  _target_: trainer.RFTrainer

backbone:
  conditioning:
    time_scale: ${flow.t_encoding.scale}

conditioner:
  type: matpac
  checkpoint_path: ???
  device: ${train.device}
  use_teacher: false
  encode_batch_size: 0
  compile_encoder: false

loss:
  loss_space: v  # 'v' (velocity) or 'x' (direct prediction)
  primary: mse  # 'mse' or 'l1'
  mr_stft_weight: 0.0  # multi-resolution STFT auxiliary loss weight (0 disables)
  mr_stft_log_weight: 0.0  # log-magnitude term weight within MR-STFT
  consistency_weight: 0.0  # RFWave-style STFT overlap/consistency residual on the raw spec (0 disables)
  cdpam_weight: 0.0  # CDPAM perceptual aux on the predicted waveform (0 disables; loads a frozen ~106 MB net)

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]

train:
  run_dir: runs/fm-baseline
  device: cuda
  max_steps: 1000
  amp: true
  ema_decay: 0.999
  grad_clip: 1.0
  grad_accum_steps: 1  # micro-batches accumulated per optimizer step (effective batch = batch_size * this)
  warmup_steps: 100  # linear LR warmup, then cosine decay to min_lr_ratio over max_steps
  min_lr_ratio: 0.0  # cosine decay floor as a fraction of the base LR
  resume: null  # null | "auto" (latest checkpoint in run_dir) | path to a .pt
  val_fraction: 0.02
  log_every: 10
  val_every: 250
  cond_dropout_prob: 0.1  # CFG label dropout: probability of zeroing the conditioning per example
  sample_every: 250
  ckpt_every: 500
  dataloader:
    batch_size: 4
    num_workers: 2
    pin_memory: true
    drop_last: true

sampling:
  batch_size: 1
  steps: 1
  method: euler  # 'heun' adds a corrector step (2× NFE) for noticeably smoother trajectories
  guidance_scale: 1.0  # >1.0 enables classifier-free guidance at sampling time
