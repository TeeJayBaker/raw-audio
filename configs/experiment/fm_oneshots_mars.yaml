# @package _global_

defaults:
  - fm_baseline
  - _self_

conditioner:
  # Cleaned via scripts/clean_matpac_ckpt.py to strip Lightning hparams/callbacks that
  # pickle-reference flow-one-shot's `src.conditioning`. Sibling config.yaml is reused.
  checkpoint_path: /media/NAS/neutone/diff_one_shot/checkpoints/whole-violet-235/last-v1_clean.ckpt

data:
  root: /media/storage/samples/samples_from_mars/one_shots
  # sample_rate, min_seconds=0.1, max_seconds=4.0, channels=1 inherited from audio_directory.yaml

train:
  run_dir: runs/fm-oneshots-mars-200k
  max_steps: 200000
  warmup_steps: 2000
  val_every: 1000
  sample_every: 2000
  ckpt_every: 5000
  val_batches: 6  # 6 × 256 ≈ 1.5k real/fake samples for MIND/cosine each validation
  dataloader:
    batch_size: 256  # see configs/backbone/*.yaml for probed max-at-4s on a 24 GiB 4090
    num_workers: 8
  wandb:
    audio_examples: 10

eval:
  metrics:
    embedding_validation:
      enabled: true
      backend: clap
      distance: mind  # cheaper than FAD (sliced Wasserstein vs Gaussian matrix-sqrt)
      cosine: true   # cosine in MATPAC conditioner space
      mind_projections: 256
      cache_real: true
      density_coverage:
        enabled: true
        k: 5

sampling:
  steps: 25
  method: euler
  guidance_scale: 3.5  # CFG; ${cond_dropout_prob}=0.1 during training enables this
