# @package _global_
#
# CPU RF smoke run on the (tiny) stft_transformer. Used by tests/test_trainer.py and
# tests/test_fd_trainer.py as the pretrain config; keep max_steps=2 / ckpt_every=1.

defaults:
  - /train/default@train
  - /data/audio_directory@data
  - /flow/fm@flow
  - /backbone/stft_transformer@backbone
  - /eval/preliminary@eval
  - _self_

trainer:
  _target_: trainer.RFTrainer

conditioner:
  type: "null"
  embedding_dim: 16

backbone:
  sample_rate: 8000
  stft:
    n_fft: 64
    hop_length: 16
    win_length: 64
  block:
    dim: 32
    depth: 1
    heads: 2
  conditioning:
    cond_dim: 16
    embed_dim: 16
    time_scale: ${flow.t_encoding.scale}

loss:
  loss_space: v
  primary: mse
  mr_stft_weight: 0.0

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-3
  weight_decay: 0.01
  betas: [0.9, 0.95]

data:
  root: data/fm-smoke
  sample_rate: 8000
  min_seconds: 0.032
  max_seconds: 0.032
  channels: 1
  augmentations:
    enabled: false

train:
  run_dir: runs/fm-smoke
  device: cpu
  max_steps: 2
  amp: false
  ema_decay: 0.9
  warmup_steps: 0
  resume: null
  val_fraction: 0.5
  log_every: 1
  val_every: 1
  sample_every: 1
  ckpt_every: 1
  dataloader:
    batch_size: 1
    num_workers: 0
    pin_memory: false
    drop_last: false

sampling:
  batch_size: 1
  steps: 2
