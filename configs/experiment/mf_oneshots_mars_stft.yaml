# @package _global_
#
# MeanFlow fine-tune of the pretrained STFT-transformer RF model. The implementation and
# training protocol are defined in docs/mf_implementation_spec.md.

defaults:
  - /train/default@train
  - /data/audio_directory@data
  - /flow/mf@flow
  - /backbone/stft_transformer@backbone
  - /eval/preliminary@eval
  - _self_

trainer:
  _target_: trainer.MFTrainer

backbone:
  conditioning:
    time_scale: ${flow.t_encoding.scale}
    gap_embed: true
    guidance_embed: true
    interval_embed: false

conditioner:
  type: matpac
  checkpoint_path: /media/NAS/neutone/diff_one_shot/checkpoints/whole-violet-235/last-v1_clean.ckpt
  device: ${train.device}
  use_teacher: false
  encode_batch_size: 0
  compile_encoder: false

loss:
  loss_space: v
  primary: mse
  mr_stft_weight: 1.0
  mr_stft_log_weight: 0.0
  aux_t_min: 0.2  # pMF t<=0.8 mirrored to repo t-axis; gates all x-space aux (mr/complex/wavefm)
  wavefm_weight: 0.0
  complex_stft_weight: 0.005

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]

data:
  root: /media/storage/samples/samples_from_mars/one_shots

train:
  run_dir: runs/mf-oneshots-mars-stft
  device: cuda
  init_from: runs/fm-oneshots-mars-stft-200k/checkpoints/step_00200000.pt
  max_steps: 150000
  amp: true
  ema_decay: 0.999
  grad_clip: 1.0
  grad_accum_steps: 4
  warmup_steps: 2000
  min_lr_ratio: 0.0
  resume: null
  val_fraction: 0.02
  log_every: 10
  val_every: 1000
  cond_dropout_prob: 0.1
  sample_every: 2000
  ckpt_every: 25000
  val_batches: 24
  dataloader:
    batch_size: 64
    num_workers: 8
    pin_memory: true
    drop_last: true
  wandb:
    audio_examples: 10

eval:
  metrics:
    embedding_validation:
      enabled: true
      backend: clap
      distance: mind
      cosine: true
      mind_projections: 256
      cache_real: true
      density_coverage:
        enabled: true
        k: 5

sampling:
  batch_size: 1
  steps: 1
  method: euler
  guidance_scale: 1.0
  guidance_t_lo: null
  guidance_t_hi: null
