t_encoding:
  # TimeEmbedding hardcodes sinusoidal expansion; `scale` is the only live field.
  # The experiment wires backbone.conditioning.time_scale to ${flow.t_encoding.scale}.
  type: sinusoidal
  scale: 100.0
eps: 1e-5
# Training timestep sampling (a training-time choice; the trainer reads these and
# passes t into RectifiedFlow.train_tuple). 'logit_normal' biases toward the middle.
t_distribution: logit_normal  # 'logit_normal' or 'uniform'
logit_mean: 0.0
logit_std: 1.0

# Flow space: 'waveform' (flow variable = waveform; STFT bracketed per model eval) or 'spec' (flow
# variable = channelised STFT; STFT/iSTFT only at the data edges). spec_scale matches the spectrogram
# std to the N(0,1) noise (the spec analogue of data.wav_scale); ignored when space=waveform.
space: waveform
spec_scale: 1.0

# Flexible CFG as a conditioning input. Null preserves ordinary RF training.
guidance: null
