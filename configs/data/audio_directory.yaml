root: data/fm-baseline
sample_rate: 48000
min_seconds: 0.05
max_seconds: 4.0
channels: 1
# WavFlow amplitude lift — a dataset property (crest-factor dependent). Applied to the target by the
# trainer (after the conditioner sees natural audio), undone by RectifiedFlow.sample.
# tanh soft-knee at ≈ 1/rms_target (= 20 dB here); lifted RMS = rms_target * wav_scale (= 1.0).
# 0.1/10 chosen from the measured one-shot crest distribution (median 13.6 dB); WavFlow's 0.33/3
# (9.6 dB ceiling) clipped transients on 80% of files. See wiki/reports/2026-05-26-rms-lift-crest-factor.html
rms_lift: false
rms_target: 0.1
wav_scale: 10.0
bucket_pool_multiplier: 100
augmentations:
  enabled: true
  pitch_shift:
    prob: 0.5
    semitones: [-2, 2]
  start_pad:
    prob: 0.3
    max_ms: 8.0
  gain:
    prob: 0.8
    db: [-3.0, 3.0]
